<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — AttendPro</title>
  <link rel="stylesheet" href="../src/styles/main.css"/>
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('att_theme')||'light');</script>
</head>
<body>
<!-- Auth guard runs immediately before any content renders -->
<script src="../src/services/auth.js"></script>
<script>auth.guardStaff();</script>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🎓</div>
      <div class="logo-name">AttendPro</div>
      <div class="logo-sub">College Edition</div>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="/students" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Students
      </a>
      <a href="/courses" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Courses
      </a>
      <a href="/attendance" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
        Mark Attendance
      </a>
      <a href="/reports" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>
        Reports
      </a>
    </nav>
    <div class="sidebar-user">
      <div class="user-row">
        <div class="user-avatar" id="sidebar-avatar">A</div>
        <div>
          <div class="user-name" id="sidebar-username">admin</div>
          <div class="user-role">Administrator</div>
        </div>
      </div>
      <button class="btn-logout">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <div class="main-wrapper">
    <div class="page-header">
      <div class="page-title">
        <h1>Dashboard</h1>
        <p>Overview &amp; quick stats</p>
      </div>
      <div class="header-right">
        <button class="btn btn-sm" id="btn-refresh" onclick="loadDashboard()" style="font-size:0.78rem;padding:5px 12px;display:flex;align-items:center;gap:5px">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Refresh
        </button>
        <div class="server-badge" id="server-badge">
          <span class="server-dot"></span>
          <span id="server-label">Checking…</span>
        </div>
        <span class="header-date" id="header-date"></span>
      </div>
    </div>

    <div class="content">
      <div class="stats-grid">
        <div class="stat-card blue">
          <div><div class="stat-number" id="stat-students">—</div><div class="stat-label">Total Students</div></div>
          <div class="stat-icon blue"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
        </div>
        <div class="stat-card purple">
          <div><div class="stat-number" id="stat-courses">—</div><div class="stat-label">Total Courses</div></div>
          <div class="stat-icon purple"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
        </div>
        <div class="stat-card green">
          <div><div class="stat-number" id="stat-present">—</div><div class="stat-label">Present Today</div></div>
          <div class="stat-icon green"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
        </div>
        <div class="stat-card red">
          <div><div class="stat-number" id="stat-absent">—</div><div class="stat-label">Absent Today</div></div>
          <div class="stat-icon red"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
        </div>
      </div>

      <div class="panels">
        <div class="panel">
          <div class="panel-header"><h3>Today's Attendance</h3></div>
          <div class="panel-body">
            <div class="donut" id="donut"></div>
            <div class="donut-legend">
              <span><span class="leg-dot" style="background:#10b981"></span>Present</span>
              <span><span class="leg-dot" style="background:#ef4444"></span>Absent</span>
            </div>
            <div class="donut-msg" id="donut-msg">No attendance marked today yet</div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="../src/services/api.js"></script>
<script src="../src/pages/dashboard.js"></script>
<script src="../src/services/theme.js"></script>
<script>auth.initSidebar();</script>
</body>
</html>
