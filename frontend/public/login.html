<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — AttendPro</title>
  <link rel="stylesheet" href="../src/styles/main.css"/>
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('att_theme')||'light');</script>
</head>
<body class="auth-body">
<div class="auth-wrap">
  <div class="auth-brand">
    <div class="auth-logo-icon">🎓</div>
    <div class="auth-logo-name">AttendPro</div>
    <div class="auth-logo-sub">College Edition</div>
    <p class="auth-tagline">Simplify attendance.<br>Empower educators.</p>
  </div>

  <div class="auth-card">
    <h2 class="auth-title">Welcome back</h2>

    <!-- Role tabs -->
    <div class="role-tabs">
      <button class="role-tab active" data-role="STAFF">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Staff
      </button>
      <button class="role-tab" data-role="STUDENT">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Student
      </button>
    </div>

    <p class="auth-subtitle" id="login-hint">Login with your staff credentials</p>
    <div id="auth-error" class="auth-alert" style="display:none"></div>

    <form id="login-form" class="auth-form">
      <div class="field-group">
        <label class="field-label">Email address</label>
        <input class="field-input" type="email" id="email" placeholder="you@college.edu" autocomplete="email" required/>
      </div>
      <div class="field-group">
        <label class="field-label">Password</label>
        <input class="field-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
      </div>
      <button class="auth-btn" type="submit" id="submit-btn">Sign in</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="/signup">Register here</a></p>
  </div>
</div>
<script src="../src/services/auth.js"></script>
<script src="../src/pages/login.js"></script>
<script src="../src/services/theme.js"></script>
</body>
</html>
