<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mark Today — AttendPro</title>
  <link rel="stylesheet" href="../src/styles/main.css"/>
</head>
<body>
<script src="../src/services/auth.js"></script>
<script>auth.guardStudent();</script>

<div class="layout">
  <!-- Student Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🎓</div>
      <div class="logo-name">AttendPro</div>
      <div class="logo-sub">Student Portal</div>
    </div>
    <nav class="sidebar-nav">
      <a href="/student" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        My Attendance
      </a>
      <a href="/student-mark" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
        Mark Today
      </a>
    </nav>
    <div class="sidebar-user">
      <div class="user-row">
        <div class="user-avatar" id="sidebar-avatar">S</div>
        <div>
          <div class="user-name" id="sidebar-username">Student</div>
          <div class="user-role">Student</div>
        </div>
      </div>
      <button class="btn-logout">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <div class="main-wrapper">
    <div class="page-header">
      <div class="page-title">
        <h1>Mark Today's Attendance</h1>
        <p id="student-info">Loading…</p>
      </div>
    </div>

    <div class="content">
      <div class="page-panel" style="max-width:520px">
        <div class="page-panel-header">
          <h3>Self-Mark Attendance</h3>
        </div>
        <div style="padding:24px 28px;display:flex;flex-direction:column;gap:18px">
          <div id="mark-alert" style="display:none;padding:12px 16px;border-radius:8px;font-size:0.875rem"></div>

          <div class="field-group">
            <label class="field-label">Today's Date</label>
            <input class="field-input" type="date" id="mark-date" readonly/>
          </div>

          <div class="field-group">
            <label class="field-label">Subject</label>
            <select class="field-input" id="mark-subject">
              <option value="">— Select subject —</option>
            </select>
          </div>

          <button class="btn btn-primary" id="btn-mark" style="align-self:flex-start;padding:10px 28px">
            Mark Present
          </button>
        </div>
      </div>

      <!-- Today's marks -->
      <div class="page-panel" style="max-width:520px;margin-top:20px">
        <div class="page-panel-header">
          <h3>Marked Today</h3>
        </div>
        <table>
          <thead><tr><th>Subject</th><th>Status</th></tr></thead>
          <tbody id="today-body">
            <tr><td class="empty-td" colspan="2">No records marked today yet.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="../src/services/api.js"></script>
<script src="../src/pages/student-mark.js"></script>
<script>auth.initSidebar();</script>
</body>
</html>
