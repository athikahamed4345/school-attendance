<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Attendance — AttendPro</title>
  <link rel="stylesheet" href="../src/styles/main.css"/>
</head>
<body>
<script src="../src/services/auth.js"></script>
<script>auth.guardStudent();</script>

<div class="layout">
  <!-- Student Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🎓</div>
      <div class="logo-name">AttendPro</div>
      <div class="logo-sub">Student Portal</div>
    </div>
    <nav class="sidebar-nav">
      <a href="/student" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        My Attendance
      </a>
      <a href="/student-mark" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
        Mark Today
      </a>
    </nav>
    <div class="sidebar-user">
      <div class="user-row">
        <div class="user-avatar" id="sidebar-avatar">S</div>
        <div>
          <div class="user-name" id="sidebar-username">Student</div>
          <div class="user-role">Student</div>
        </div>
      </div>
      <button class="btn-logout">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <div class="main-wrapper">
    <div class="page-header">
      <div class="page-title">
        <h1>My Attendance</h1>
        <p id="student-info">Loading…</p>
      </div>
      <div class="header-right">
        <span class="server-badge" id="pct-badge" style="display:none">
          <span class="server-dot"></span>
          <span id="pct-text">—%</span>
        </span>
      </div>
    </div>

    <div class="content">
      <!-- Summary cards -->
      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:22px">
        <div class="stat-card green">
          <div><div class="stat-number" id="s-present">—</div><div class="stat-label">Classes Present</div></div>
          <div class="stat-icon green">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </div>
        </div>
        <div class="stat-card red">
          <div><div class="stat-number" id="s-absent">—</div><div class="stat-label">Classes Absent</div></div>
          <div class="stat-icon red">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          </div>
        </div>
        <div class="stat-card blue">
          <div><div class="stat-number" id="s-total">—</div><div class="stat-label">Total Classes</div></div>
          <div class="stat-icon blue">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </div>
        </div>
      </div>

      <!-- Attendance records -->
      <div class="page-panel">
        <div class="page-panel-header">
          <h3>Attendance History <span style="font-size:0.75rem;color:var(--muted);font-weight:400">(last 90 days)</span></h3>
        </div>
        <table>
          <thead><tr><th>Date</th><th>Subject</th><th>Status</th></tr></thead>
          <tbody id="att-body">
            <tr><td class="empty-td" colspan="3">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="../src/services/api.js"></script>
<script src="../src/pages/student.js"></script>
<script>auth.initSidebar();</script>
</body>
</html>
