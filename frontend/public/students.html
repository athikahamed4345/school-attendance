<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Students — AttendPro</title>
  <link rel="stylesheet" href="../src/styles/main.css"/>
</head>
<body>
<script src="../src/services/auth.js"></script>
<script>auth.guard();</script>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🎓</div>
      <div class="logo-name">AttendPro</div>
      <div class="logo-sub">College Edition</div>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="/students" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Students
      </a>
      <a href="/courses" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Courses
      </a>
      <a href="/attendance" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
        Mark Attendance
      </a>
      <a href="/reports" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>
        Reports
      </a>
    </nav>
    <div class="sidebar-user">
      <div class="user-row">
        <div class="user-avatar" id="sidebar-avatar">A</div>
        <div>
          <div class="user-name" id="sidebar-username">admin</div>
          <div class="user-role">Administrator</div>
        </div>
      </div>
      <button class="btn-logout">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <div class="main-wrapper">
    <div class="page-header">
      <div class="page-title"><h1>Students</h1><p>Manage enrolled students</p></div>
      <button class="btn btn-primary" id="btn-add-student">+ Add Student</button>
    </div>
    <div class="content">
      <div class="page-panel">
        <div class="page-panel-header">
          <h3>All Students</h3>
          <span id="student-count" style="font-size:0.8rem;color:var(--muted)"></span>
        </div>
        <table>
          <thead><tr><th>Roll No</th><th>Name</th><th>Department</th><th>Action</th></tr></thead>
          <tbody id="students-body"><tr><td class="empty-td" colspan="4">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="../src/services/api.js"></script>
<script src="../src/pages/students.js"></script>
<script>auth.initSidebar();</script>
</body>
</html>
